<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vineguard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <main class="game-shell" aria-label="Vineguard game">
        <canvas id="game" width="1280" height="720"></canvas>
      </main>
      <div id="title-actions" class="title-actions">
        <button id="start-run" type="button">Start Run</button>
      </div>
      <form id="high-score-panel" class="high-score-panel" hidden>
        <label for="high-score-name">Team name</label>
        <div class="score-entry-row">
          <input id="high-score-name" type="text" maxlength="32" autocomplete="off" value="Vineguard Team">
          <button type="submit">Save Score</button>
        </div>
      </form>
      <div id="game-over-actions" class="game-over-actions" hidden>
        <button id="continue-title" type="button">Continue</button>
      </div>
      <div id="title-credit" class="title-credit">
        <span>By HanClinto Games for</span>
        <a href="https://itch.io/jam/cgdc-speedgame-classic-2026" target="_blank" rel="noreferrer">CGDC Speedgame Classic 2026</a>
      </div>
      <div class="toolbar">
        <button id="options-toggle" type="button" aria-label="Options" aria-expanded="false" aria-controls="options-panel"></button>
      </div>
      <section id="options-panel" class="options-panel" hidden>
        <button id="options-close" class="options-close" type="button" aria-label="Close settings">X</button>
        <div id="controls-grid" class="controls-grid" aria-label="Control bindings"></div>
        <button id="reset-controls" type="button">Reset controls</button>
        <h2>High Scores</h2>
        <button id="reset-high-scores" type="button">Reset high scores</button>
        <h2>Game Parameters</h2>
        <div id="parameters-grid" class="parameters-grid" aria-label="Game parameters"></div>
        <button id="reset-parameters" type="button">Reset parameters</button>
      </section>
    </div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
