<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vineguard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <main class="game-shell" aria-label="Vineguard game">
        <canvas id="game" width="960" height="540"></canvas>
      </main>
      <div class="toolbar">
        <button id="options-toggle" type="button" aria-label="Options" aria-expanded="false" aria-controls="options-panel"></button>
      </div>
      <section id="options-panel" class="options-panel" hidden>
        <label class="check-row">
          <input id="skip-tutorial" type="checkbox">
          <span>Skip tutorial</span>
        </label>
        <div id="controls-grid" class="controls-grid" aria-label="Control bindings"></div>
        <button id="reset-controls" type="button">Reset controls</button>
      </section>
    </div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
